<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Meme template placeholder</title>
  <desc id="desc">A reusable placeholder image for meme templates that do not have final art yet.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#272c39"/>
      <stop offset="1" stop-color="#111620"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <rect x="120" y="120" width="960" height="660" rx="30" fill="none" stroke="#67e8a5" stroke-width="8" stroke-dasharray="28 24"/>
  <circle cx="600" cy="380" r="120" fill="#67e8a5" fill-opacity="0.18" stroke="#67e8a5" stroke-width="8"/>
  <path d="M360 660c80-120 160-180 240-180s160 60 240 180" fill="none" stroke="#f8fafc" stroke-opacity="0.85" stroke-width="18" stroke-linecap="round"/>
  <text x="600" y="735" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="54" font-weight="700">Template Placeholder</text>
</svg>
